<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <title>Quản lý Lớp Học</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="sidebar">
      <h2>English Center</h2>
      <p>Quản lý hệ thống</p>
      <hr />
      <a href="index.html" class="menu-item"> Học viên</a>
      <a href="lophoc.html" class="menu-item active"> Lớp học</a>
      <a href="hocphi.html" class="menu-item">Học phí</a>
    </div>

    <div class="main-content">
      <div class="top-search-bar">
        <div class="search-box">
          <i class="fas fa-search search-icon"></i>
          <input
            type="text"
            id="search-class-input"
            placeholder="Nhập tên hoặc mã số lớp học"
            oninput="loadClasses()"
          />
        </div>
      </div>
      <h2>Danh Sách Lớp Học</h2>

      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>Mã Lớp</th>
              <th>Tên Lớp</th>
              <th>Giáo viên</th>
              <th>Sĩ số</th>
              <th>Lịch học</th>
            </tr>
          </thead>
          <tbody id="class-table-body"></tbody>
        </table>
      </div>

      <div class="add-student-container">
        <h3>Thêm lớp học mới</h3>
        <form id="add-class-form" onsubmit="handleAddClass(event)">
          <input
            type="text"
            id="input-tenLop"
            placeholder="Tên lớp học"
            required
          />
          <input
            type="text"
            id="input-giaoVien"
            placeholder="Tên giáo viên"
            required
          />

          <select id="select-loaiLop" required>
            <option value="">Chọn loại lớp</option>
            <option value="ielts">IELTS</option>
            <option value="comm">COMM</option>
            <option value="toeic">TOEIC</option>
          </select>

          <input
            type="number"
            id="input-siSoToiDa"
            placeholder="Sĩ số (vd: 20)"
            required
            min="1"
          />
          <input
            type="text"
            id="input-lichHoc"
            placeholder="Chọn hoặc nhập lịch học"
            required
          />

          <button type="submit" class="btn-submit">Lưu thông tin</button>
        </form>
      </div>
    </div>

    <script src="lophoc.js"></script>
  </body>
</html>
