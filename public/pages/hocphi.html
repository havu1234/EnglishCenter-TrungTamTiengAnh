<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản Lý Học Phí - English Center</title>
    <link rel="stylesheet" href="../css/dashboard.css" />
  </head>
  <body>
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">
        <h2>🎓 Trung Tâm Anh Ngữ</h2>
      </div>
      <nav class="nav-menu">
        <a href="dashboard.html" class="nav-item">
          <span class="icon">📊</span>
          <span>Tổng Quan</span>
        </a>
        <a href="index.html" class="nav-item">
          <span class="icon">👥</span>
          <span>Học Viên</span>
        </a>
        <a href="lophoc.html" class="nav-item">
          <span class="icon">📚</span>
          <span>Lớp Học</span>
        </a>
        <a href="diemdanh.html" class="nav-item">
          <span class="icon">✓</span>
          <span>Điểm Danh</span>
        </a>
        <a href="hocphi.html" class="nav-item active">
          <span class="icon">💰</span>
          <span>Học Phí</span>
        </a>
      </nav>
      <div class="user-info">
        <div class="user-avatar">👤</div>
        <div class="user-details">
          <div class="user-name" id="userName">Loading...</div>
          <div class="user-role" id="userRole">Loading...</div>
        </div>
        <button class="btn-logout" id="btnLogout">Đăng xuất</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Header -->
      <header class="header">
        <h1>Quản Lý Học Phí</h1>
        <div class="header-actions">
          <span class="date" id="currentDate"></span>
        </div>
      </header>

      <!-- Content Area -->
      <div class="content">
        <div class="page-header">
          <h2>Danh Sách Học Phí</h2>
        </div>

        <div
          class="search-bar"
          style="display: flex; gap: 1rem; align-items: center"
        >
          <input
            type="text"
            id="searchTuition"
            placeholder="Tìm kiếm theo tên học viên hoặc lớp..."
            oninput="loadTuitions()"
            style="flex: 1"
          />
          <select
            id="filterStatus"
            onchange="loadTuitions()"
            style="
              padding: 0.625rem;
              border: 1px solid var(--gray-300);
              border-radius: 0.375rem;
            "
          >
            <option value="">Tất cả trạng thái</option>
            <option value="Đã đóng">Đã đóng</option>
            <option value="Chưa đóng">Chưa đóng</option>
            <option value="Đóng một phần">Đóng một phần</option>
          </select>
        </div>

        <div class="stats-grid" style="margin-bottom: 2rem">
          <div class="stat-card">
            <div class="stat-icon" style="background: #fee2e2; color: #991b1b">
              💸
            </div>
            <div class="stat-info">
              <div class="stat-value" id="statUnpaid">0</div>
              <div class="stat-label">Chưa Đóng</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background: #fef3c7; color: #92400e">
              ⏳
            </div>
            <div class="stat-info">
              <div class="stat-value" id="statPartial">0</div>
              <div class="stat-label">Đóng Một Phần</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background: #d1fae5; color: #065f46">
              💰
            </div>
            <div class="stat-info">
              <div class="stat-value" id="statRevenue">0đ</div>
              <div class="stat-label">Doanh Thu Tháng</div>
            </div>
          </div>
        </div>

        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Học Viên</th>
                <th>Lớp Học</th>
                <th>Tổng Học Phí</th>
                <th>Đã Đóng</th>
                <th>Còn Lại</th>
                <th>Trạng Thái</th>
                <th>Hạn Đóng</th>
              </tr>
            </thead>
            <tbody id="tuitionTableBody">
              <tr>
                <td colspan="7" class="text-center">Đang tải dữ liệu...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/hocphi.js"></script>
  </body>
</html>
