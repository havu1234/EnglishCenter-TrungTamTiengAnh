<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản Lý Lớp Học - English Center</title>
    <link rel="stylesheet" href="../css/dashboard.css" />
  </head>
  <body>
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">
        <h2>🎓 Trung Tâm Anh Ngữ</h2>
      </div>
      <nav class="nav-menu">
        <a href="dashboard.html" class="nav-item">
          <span class="icon">📊</span>
          <span>Tổng Quan</span>
        </a>
        <a href="index.html" class="nav-item">
          <span class="icon">👥</span>
          <span>Học Viên</span>
        </a>
        <a href="lophoc.html" class="nav-item active">
          <span class="icon">📚</span>
          <span>Lớp Học</span>
        </a>
        <a href="diemdanh.html" class="nav-item">
          <span class="icon">✓</span>
          <span>Điểm Danh</span>
        </a>
        <a href="hocphi.html" class="nav-item">
          <span class="icon">💰</span>
          <span>Học Phí</span>
        </a>
      </nav>
      <div class="user-info">
        <div class="user-avatar">👤</div>
        <div class="user-details">
          <div class="user-name" id="userName">Loading...</div>
          <div class="user-role" id="userRole">Loading...</div>
        </div>
        <button class="btn-logout" id="btnLogout">Đăng xuất</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Header -->
      <header class="header">
        <h1>Quản Lý Lớp Học</h1>
        <div class="header-actions">
          <span class="date" id="currentDate"></span>
        </div>
      </header>

      <!-- Content Area -->
      <div class="content">
        <div class="page-header">
          <h2>Danh Sách Lớp Học</h2>
          <button class="btn-primary" id="btnAddClass">+ Thêm Lớp Học</button>
        </div>

        <div class="search-bar">
          <input
            type="text"
            id="searchClass"
            placeholder="Tìm kiếm theo tên hoặc mã lớp..."
            oninput="loadClasses()"
          />
        </div>

        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Mã Lớp</th>
                <th>Tên Lớp</th>
                <th>Giáo Viên</th>
                <th>Sĩ Số</th>
                <th>Lịch Học</th>
                <th>Thao Tác</th>
              </tr>
            </thead>
            <tbody id="classesTableBody">
              <tr>
                <td colspan="6" class="text-center">Đang tải dữ liệu...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Modal Add/Edit Class -->
    <div class="modal hidden" id="classModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="classModalTitle">Thêm Lớp Học</h3>
          <button class="btn-close" id="closeClassModal">&times;</button>
        </div>
        <form id="classForm">
          <div class="form-group">
            <label>Tên Lớp *</label>
            <input type="text" name="tenLop" required />
          </div>
          <div class="form-group">
            <label>Giáo Viên *</label>
            <input type="text" name="giaoVien" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Loại Khóa Học *</label>
              <select name="loaiKhoaHoc" required>
                <option value="">-- Chọn loại --</option>
                <option value="ielts">IELTS</option>
                <option value="comm">COMM</option>
                <option value="toeic">TOEIC</option>
              </select>
            </div>
            <div class="form-group">
              <label>Sĩ Số Tối Đa *</label>
              <input type="number" name="siSoToiDa" required min="1" max="50" />
            </div>
          </div>
          <div class="form-group">
            <label>Lịch Học</label>
            <input
              type="text"
              name="lichHoc"
              placeholder="VD: T2, T4, T6 - 18:00-20:00"
            />
          </div>
          <div class="modal-footer">
            <button type="button" class="btn-secondary" id="cancelClassModal">
              Hủy
            </button>
            <button type="submit" class="btn-primary">Lưu</button>
          </div>
        </form>
      </div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/lophoc.js"></script>
  </body>
</html>
