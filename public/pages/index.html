<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản Lý Học Viên - English Center</title>
    <link rel="stylesheet" href="../css/dashboard.css" />
  </head>
  <body>
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">
        <h2>🎓 Trung Tâm Anh Ngữ</h2>
      </div>
      <nav class="nav-menu">
        <a href="dashboard.html" class="nav-item">
          <span class="icon">📊</span>
          <span>Tổng Quan</span>
        </a>
        <a href="index.html" class="nav-item active">
          <span class="icon">👥</span>
          <span>Học Viên</span>
        </a>
        <a href="lophoc.html" class="nav-item">
          <span class="icon">📚</span>
          <span>Lớp Học</span>
        </a>
        <a href="diemdanh.html" class="nav-item">
          <span class="icon">✓</span>
          <span>Điểm Danh</span>
        </a>
        <a href="hocphi.html" class="nav-item">
          <span class="icon">💰</span>
          <span>Học Phí</span>
        </a>
      </nav>
      <div class="user-info">
        <div class="user-avatar">👤</div>
        <div class="user-details">
          <div class="user-name" id="userName">Loading...</div>
          <div class="user-role" id="userRole">Loading...</div>
        </div>
        <button class="btn-logout" id="btnLogout">Đăng xuất</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Header -->
      <header class="header">
        <h1>Quản Lý Học Viên</h1>
        <div class="header-actions">
          <span class="date" id="currentDate"></span>
        </div>
      </header>

      <!-- Content Area -->
      <div class="content">
        <div class="page-header">
          <h2>Danh Sách Học Viên</h2>
          <button class="btn-primary" id="btnAddStudent">
            + Thêm Học Viên
          </button>
        </div>

        <div class="search-bar">
          <input
            type="text"
            id="searchStudent"
            placeholder="Tìm kiếm theo tên hoặc số điện thoại..."
          />
        </div>

        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Họ Tên</th>
                <th>Số Điện Thoại</th>
                <th>Email</th>
                <th>Lớp Học</th>
                <th>Ngày Nhập Học</th>
                <th>Trạng Thái</th>
                <th>Thao Tác</th>
              </tr>
            </thead>
            <tbody id="studentsTableBody">
              <tr>
                <td colspan="7" class="text-center">Đang tải dữ liệu...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Modal Add/Edit Student -->
    <div class="modal hidden" id="studentModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="studentModalTitle">Thêm Học Viên</h3>
          <button class="btn-close" id="closeStudentModal">&times;</button>
        </div>
        <form id="studentForm">
          <div class="form-group">
            <label>Họ Tên *</label>
            <input type="text" name="fullName" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Số Điện Thoại *</label>
              <input type="tel" name="phone" pattern="[0-9]{10}" required />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" name="email" />
            </div>
          </div>
          <div class="form-group">
            <label>Lớp Học *</label>
            <select name="classId" required id="studentClassSelect">
              <option value="">-- Chọn lớp --</option>
            </select>
          </div>
          <div class="form-group">
            <label>Trạng Thái</label>
            <select name="status">
              <option value="Đang học">Đang học</option>
              <option value="Bảo lưu">Bảo lưu</option>
              <option value="Đã nghỉ">Đã nghỉ</option>
              <option value="Hoàn thành">Hoàn thành</option>
            </select>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn-secondary" id="cancelStudentModal">
              Hủy
            </button>
            <button type="submit" class="btn-primary">Lưu</button>
          </div>
        </form>
      </div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
